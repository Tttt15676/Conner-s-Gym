<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="bg-gray-800 p-8 rounded-xl w-96">

  <!-- TOGGLE -->
  <div class="flex justify-between mb-6">
    <button onclick="showLogin()" class="text-blue-400">Login</button>
    <button onclick="showSignup()" class="text-orange-400">Sign Up</button>
  </div>

  <!-- LOGIN -->
  <form id="loginForm">
    <input id="loginEmail" type="email" placeholder="Email"
      class="w-full mb-3 p-2 rounded bg-gray-700">

    <input id="loginPassword" type="password" placeholder="Password"
      class="w-full mb-3 p-2 rounded bg-gray-700">

    <button class="bg-blue-500 w-full py-2 rounded hover:bg-blue-600">
      Login
    </button>
  </form>

  <!-- SIGNUP -->
  <form id="signupForm" class="hidden">
    <input id="signupName" type="text" placeholder="Name"
      class="w-full mb-3 p-2 rounded bg-gray-700">

    <input id="signupEmail" type="email" placeholder="Email"
      class="w-full mb-3 p-2 rounded bg-gray-700">

    <input id="signupPassword" type="password" placeholder="Password"
      class="w-full mb-3 p-2 rounded bg-gray-700">

    <button class="bg-orange-500 w-full py-2 rounded hover:bg-orange-600">
      Sign Up
    </button>
  </form>

  <p id="msg" class="text-center mt-4 text-red-400"></p>

</div>

<script>
// TOGGLE FORMS
function showLogin() {
  document.getElementById("loginForm").classList.remove("hidden");
  document.getElementById("signupForm").classList.add("hidden");
}

function showSignup() {
  document.getElementById("signupForm").classList.remove("hidden");
  document.getElementById("loginForm").classList.add("hidden");
}


// SIGNUP
document.getElementById("signupForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("signupName").value;
  const email = document.getElementById("signupEmail").value;
  const password = document.getElementById("signupPassword").value;

  const res = await fetch("http://localhost:3000/signup", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, password })
  });

  const data = await res.json();
  document.getElementById("msg").innerText = data.message;
});


// LOGIN
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("token", data.token);
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("msg").innerText = data.message;
  }
});
</script>

</body>
      </html>
