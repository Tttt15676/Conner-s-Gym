<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center h-screen text-white">

<div class="bg-gray-800 p-8 rounded-xl w-96">
  <h2 class="text-2xl mb-6 text-center">Login</h2>

  <form id="loginForm">
    <input id="email" type="email" placeholder="Email"
      class="w-full mb-4 p-2 rounded bg-gray-700">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 p-2 rounded bg-gray-700">

    <button class="bg-blue-500 w-full py-2 rounded hover:bg-blue-600">
      Login
    </button>
  </form>

  <p id="error" class="text-red-400 mt-4 text-center"></p>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("user", JSON.stringify(data.user));
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("error").innerText = data.message;
  }
});
</script>

</body>
</html>
