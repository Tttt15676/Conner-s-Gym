<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - Connor's Gym</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: "#fb923c",
            primary: "#2563eb"
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-950 text-white">

<!-- NAVBAR -->
<nav class="flex justify-between items-center px-6 py-4 bg-gray-900 border-b border-gray-800">
  <h1 class="text-xl font-bold text-accent">Connor's Gym</h1>

  <div class="flex items-center gap-6">
    <span id="userEmail" class="text-gray-400 text-sm"></span>
    <button onclick="logout()" class="bg-accent px-4 py-2 rounded hover:bg-orange-500">
      Logout
    </button>
  </div>
</nav>

<!-- DASHBOARD -->
<section class="p-6 max-w-6xl mx-auto">

  <!-- HEADER -->
  <div class="mb-8">
    <h2 class="text-3xl font-bold mb-2">Welcome Back</h2>
    <p class="text-gray-400">Track your progress and manage your membership</p>
  </div>

  <!-- STATS -->
  <div class="grid md:grid-cols-3 gap-6 mb-10">

    <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
      <h3 class="text-gray-400 text-sm mb-2">Current Plan</h3>
      <p id="userPlan" class="text-2xl font-bold text-accent">Loading...</p>
    </div>

    <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
      <h3 class="text-gray-400 text-sm mb-2">Workouts This Week</h3>
      <p class="text-2xl font-bold">4</p>
    </div>

    <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
      <h3 class="text-gray-400 text-sm mb-2">Classes Booked</h3>
      <p class="text-2xl font-bold">2</p>
    </div>

  </div>

  <!-- MAIN GRID -->
  <div class="grid md:grid-cols-2 gap-6">

    <!-- PROGRESS -->
    <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
      <h3 class="text-xl font-bold mb-4">Progress Tracker</h3>
      <p class="text-gray-400 mb-4">
        Track your strength, endurance, and overall fitness improvements.
      </p>

      <button onclick="window.location.href='progress.html'"
        class="bg-primary px-4 py-2 rounded hover:bg-blue-600">
        View Progress
      </button>
    </div>

    <!-- CLASSES -->
    <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
      <h3 class="text-xl font-bold mb-4">Upcoming Classes</h3>

      <ul class="text-gray-400 space-y-2 mb-4">
        <li>HIIT - Monday</li>
        <li>Yoga - Wednesday</li>
      </ul>

      <button onclick="window.location.href='classes.html'"
        class="bg-accent px-4 py-2 rounded hover:bg-orange-500">
        Book More Classes
      </button>
    </div>

  </div>

</section>

<!-- SCRIPT -->
<script>
const SUPABASE_URL = "YOUR_URL";
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

// 🔐 Protect page
async function checkUser() {
  const { data: { user } } = await supabaseClient.auth.getUser();

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  // show email
  document.getElementById("userEmail").innerText = user.email;

  // get profile data
  const { data } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  document.getElementById("userPlan").innerText = data.plan;
}

checkUser();

// 🚪 Logout
async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = "index.html";
}
</script>

</body>
</html>
